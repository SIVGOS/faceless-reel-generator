services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: faceless-reel-generator
    container_name: reel-forge
    ports:
      - "8000:8000"
    environment:
      # Pulled from a local .env (see .env.example). Compose substitutes these.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_GENERATION_MODEL: ${GEMINI_GENERATION_MODEL:-gemini-2.5-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      JWT_SECRET: ${JWT_SECRET:-insecure-dev-secret-change-me}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}
      TTS_VOICE: ${TTS_VOICE:-en-US-ChristopherNeural}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      # Fixed in-container mount point; the host folder is wired via the volume.
      BG_VIDEO_FOLDER_PATH: /media/backgrounds
    volumes:
      # Mount the external video library (host BG_VIDEO_FOLDER_PATH) read-only.
      # Refresh the pool externally without rebuilding the image, and never
      # commit large media to git. Defaults to ./backgrounds if unset.
      - ${BG_VIDEO_FOLDER_PATH:-./backgrounds}:/media/backgrounds:ro
      # Persist sqlite DB + rendered reels across restarts.
      - ./data:/app/data
      # Cache the downloaded whisper model between runs.
      - whisper-cache:/root/.cache
    restart: unless-stopped

volumes:
  whisper-cache:
